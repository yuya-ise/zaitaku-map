<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>施設在宅マップ</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg-primary:#f5f6fa;--bg-sidebar:#fff;--bg-card:#f0f1f5;--bg-card-hover:#e8e9f0;--border:#dcdee6;--text-primary:#1a1c2e;--text-secondary:#5a5d78;--text-muted:#8b8ea8;--accent:#3b5cff;--accent-dim:rgba(59,92,255,0.1);--shadow-sm:0 1px 3px rgba(0,0,0,0.06);--shadow-md:0 4px 16px rgba(0,0,0,0.08);--shadow-lg:0 8px 32px rgba(0,0,0,0.1)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP','IBM Plex Sans',sans-serif;background:var(--bg-primary);color:var(--text-primary);height:100vh;overflow:hidden;display:flex}
.sidebar{width:400px;min-width:400px;height:100vh;background:var(--bg-sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:1000;box-shadow:var(--shadow-md)}
.sidebar-header{padding:16px 24px 12px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,#f8f9ff 0%,#fff 100%)}
.sidebar-header h1{font-size:18px;font-weight:600;display:flex;align-items:center;gap:10px}
.sidebar-header h1 .icon-pill{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;box-shadow:0 2px 8px rgba(59,92,255,0.3)}
.stats-bar{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap}
.stat-value{font-family:'IBM Plex Sans',sans-serif;font-size:22px;font-weight:600;color:var(--accent)}
.stat-label{font-size:10px;color:var(--text-muted);letter-spacing:0.05em}
.meta-bar{display:flex;gap:12px;margin-top:8px;font-size:10px;color:var(--text-muted);flex-wrap:wrap;align-items:center}
.meta-bar .warn{color:#e63946;font-weight:500}
.controls-wrapper{padding:10px 20px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px;background:#fafbff}
.search-container{position:relative}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:14px;pointer-events:none}
.search-box{width:100%;padding:9px 14px 9px 38px;background:#fff;border:1px solid var(--border);border-radius:10px;color:var(--text-primary);font-family:inherit;font-size:13px;outline:none;box-shadow:var(--shadow-sm)}
.search-box:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,92,255,0.12)}
.filter-row{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.filter-label{font-size:10px;color:var(--text-muted);font-weight:500;margin-right:2px}
.area-btn,.filter-btn{padding:4px 10px;font-size:10px;font-family:inherit;font-weight:500;border:1px solid var(--border);border-radius:7px;background:#fff;color:var(--text-secondary);cursor:pointer;white-space:nowrap}
.area-btn:hover,.filter-btn:hover{background:var(--bg-card-hover)}
.area-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 6px rgba(59,92,255,0.2)}
.filter-btn.active{background:#374151;border-color:#374151;color:#fff}
.toggle-inactive{display:flex;align-items:center;gap:5px;padding:4px 10px;font-size:10px;font-family:inherit;font-weight:500;border:1px solid var(--border);border-radius:7px;background:#fff;color:var(--text-muted);cursor:pointer}
.toggle-inactive:hover{background:var(--bg-card-hover)}
.toggle-inactive.active{background:#6b7280;border-color:#6b7280;color:#fff}
.toggle-inactive .diamond{display:inline-block;width:8px;height:8px;background:#9ca3af;transform:rotate(45deg);border-radius:1px}
.toggle-inactive.active .diamond{background:#fff}
.facility-type-select{padding:4px 8px;font-size:10px;font-family:inherit;border:1px solid var(--border);border-radius:7px;background:#fff;color:var(--text-secondary);outline:none;max-width:180px;cursor:pointer}
.tab-bar{display:flex;border-bottom:1px solid var(--border)}
.tab-btn{flex:1;padding:9px 0;font-size:12px;font-family:inherit;font-weight:500;border:none;background:transparent;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent}
.tab-btn:hover{color:var(--text-primary);background:var(--bg-card)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-content{display:none;flex:1;overflow-y:auto}
.tab-content.active{display:flex;flex-direction:column}
.route-panel{padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.route-panel label{font-size:11px;font-weight:500;color:var(--text-secondary);margin-bottom:2px}
.autocomplete-wrapper{position:relative}
.autocomplete-input{width:100%;padding:9px 12px;background:#fff;border:1px solid var(--border);border-radius:10px;font-family:inherit;font-size:12px;color:var(--text-primary);outline:none}
.autocomplete-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,92,255,0.12)}
.autocomplete-input::placeholder{color:var(--text-muted)}
.autocomplete-list{position:absolute;top:100%;left:0;right:0;max-height:200px;overflow-y:auto;background:#fff;border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;box-shadow:var(--shadow-md);z-index:100;display:none}
.autocomplete-list.show{display:block}
.autocomplete-item{padding:8px 12px;font-size:11px;cursor:pointer;border-bottom:1px solid #f0f1f5;display:flex;flex-direction:column;gap:1px}
.autocomplete-item:hover,.autocomplete-item.highlighted{background:var(--accent-dim)}
.autocomplete-item-name{font-weight:500;color:var(--text-primary)}
.autocomplete-item-sub{font-size:10px;color:var(--text-muted)}
.autocomplete-list::-webkit-scrollbar{width:4px}
.autocomplete-list::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px}
.selected-tag{display:flex;align-items:center;gap:8px;padding:7px 12px;background:var(--accent-dim);border:1px solid rgba(59,92,255,0.2);border-radius:10px;font-size:12px;color:var(--accent);font-weight:500}
.selected-tag .clear-btn{background:none;border:none;color:var(--text-muted);font-size:16px;cursor:pointer;padding:0 2px;line-height:1}
.selected-tag .clear-btn:hover{color:var(--text-primary)}
.route-search-btn{padding:10px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 2px 8px rgba(59,92,255,0.3)}
.route-search-btn:hover{background:#2a4bef}
.route-search-btn:disabled{background:#a0aec0;cursor:not-allowed;box-shadow:none}
.route-result{padding:14px;background:var(--bg-card);border-radius:12px;display:none}
.route-result.show{display:block}
.route-result-title{font-size:12px;font-weight:600;margin-bottom:6px}
.route-result-detail{display:flex;gap:10px;margin-top:6px}
.route-result-badge{background:#eef2ff;color:#4f46e5;padding:3px 10px;border-radius:6px;font-weight:600;font-size:12px}
.route-result-names{font-size:11px;color:var(--text-secondary);line-height:1.6;margin-top:4px}
.route-clear-btn{padding:6px;background:transparent;color:var(--text-muted);border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:11px;cursor:pointer;margin-top:6px}
.route-clear-btn:hover{background:var(--bg-card-hover);color:var(--text-primary)}
.pharmacy-list{flex:1;overflow-y:auto;padding:6px 10px}
.pharmacy-list::-webkit-scrollbar{width:5px}
.pharmacy-list::-webkit-scrollbar-thumb{background:#cccfd8;border-radius:10px}
.area-section-label{font-size:10px;font-weight:600;color:var(--accent);letter-spacing:0.06em;padding:12px 12px 4px;border-bottom:1px solid var(--border);margin-bottom:3px}
.pharmacy-card{padding:8px 12px;border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:10px}
.pharmacy-card:hover{background:var(--bg-card)}
.pharmacy-card.active{background:var(--accent-dim);border:1px solid rgba(59,92,255,0.2)}
.color-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0;box-shadow:var(--shadow-sm)}
.pharmacy-info{flex:1;min-width:0}
.pharmacy-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pharmacy-meta{font-size:10px;color:var(--text-secondary);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.facility-count{font-family:'IBM Plex Sans',sans-serif;background:var(--accent-dim);color:var(--accent);padding:2px 7px;border-radius:5px;font-size:10px;font-weight:600;flex-shrink:0}
.facility-list{max-height:0;overflow:hidden;transition:max-height 0.3s ease;padding-left:22px}
.facility-list.open{max-height:3000px}
.facility-item{padding:7px 12px;font-size:11px;color:var(--text-secondary);border-left:2px solid var(--border);margin-left:6px;cursor:pointer;display:flex;align-items:flex-start;gap:6px;flex-direction:column}
.facility-item:hover{color:var(--text-primary);border-left-color:var(--accent);background:var(--bg-card);border-radius:0 8px 8px 0}
.facility-item-header{display:flex;align-items:center;gap:5px;width:100%}
.facility-icon-small{font-size:9px;opacity:0.6}
.facility-route-info{font-size:10px;color:var(--text-muted);display:flex;gap:8px;margin-top:1px;padding-left:16px}
.route-badge{background:#eef2ff;color:#4f46e5;padding:1px 6px;border-radius:4px;font-weight:500;font-size:9px}
.route-click-hint{font-size:9px;color:var(--accent);padding-left:16px;margin-top:1px;cursor:pointer}
.route-click-hint:hover{text-decoration:underline}
.no-results{padding:40px 20px;text-align:center;color:var(--text-muted);font-size:13px}
.no-results-icon{font-size:32px;margin-bottom:8px}
.no-results-text{font-size:12px;margin-top:4px;color:var(--text-muted)}
.map-container{flex:1;position:relative}
#map{width:100%;height:100%}
.map-legend{position:absolute;bottom:20px;right:20px;background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px 18px;z-index:999;box-shadow:var(--shadow-lg);font-size:11px}
.legend-title{font-size:10px;font-weight:600;color:var(--text-muted);letter-spacing:0.08em;margin-bottom:8px}
.legend-item{display:flex;align-items:center;gap:8px;margin-bottom:5px;color:var(--text-secondary)}
.legend-icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center}
.sidebar-toggle{display:none;position:absolute;top:12px;left:12px;z-index:1001;width:44px;height:44px;background:#fff;border:1px solid var(--border);border-radius:10px;color:var(--text-primary);font-size:20px;cursor:pointer;align-items:center;justify-content:center;box-shadow:var(--shadow-md)}
.leaflet-popup-content-wrapper{background:#fff !important;border:1px solid var(--border) !important;border-radius:12px !important;box-shadow:var(--shadow-lg) !important}
.leaflet-popup-tip{background:#fff !important}
.leaflet-popup-content{margin:12px 14px !important;font-family:'Noto Sans JP',sans-serif !important;font-size:12px !important;line-height:1.6 !important}
.popup-title{font-weight:600;font-size:13px;margin-bottom:3px}.popup-type{font-size:10px;color:var(--text-muted);margin-bottom:4px}.popup-address{font-size:11px;color:var(--text-secondary)}.popup-parent{font-size:10px;color:var(--accent);margin-top:3px;font-weight:500}.popup-detail{font-size:10px;color:var(--text-muted);margin-top:2px}
.popup-status{font-size:10px;color:var(--text-secondary);margin-top:2px;line-height:1.6}.popup-status .status-label{color:var(--text-muted)}.popup-status .status-yes{color:#059669;font-weight:600}.popup-status .status-no{color:var(--text-muted)}
.popup-visit{margin-top:6px;padding:6px 8px;background:#f5f3ff;border:1px solid #e0dbff;border-radius:6px}.popup-visit-title{font-size:10px;font-weight:600;color:#7c3aed;margin-bottom:3px}.popup-visit-row{font-size:10px;color:#5b21b6;line-height:1.5}.popup-visit-note{font-size:9px;color:#6d28d9;margin-top:3px;padding-top:3px;border-top:1px solid #e0dbff;line-height:1.4}
.leaflet-control-zoom{border:1px solid var(--border) !important;border-radius:10px !important;overflow:hidden;box-shadow:var(--shadow-md) !important}
.leaflet-control-zoom a{background:#fff !important;color:var(--text-primary) !important;border-bottom:1px solid var(--border) !important;width:34px !important;height:34px !important;line-height:34px !important}
.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,0.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:14px}
.loading-spinner{width:44px;height:44px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:var(--text-secondary);font-weight:500}
.loading-sub{font-size:11px;color:var(--text-muted)}
@media(max-width:768px){.sidebar{position:absolute;transform:translateX(-100%);width:340px;min-width:340px}.sidebar.open{transform:translateX(0)}.sidebar-toggle{display:flex}}
</style>
</head>
<body>
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">施設在宅マップを読み込み中...</div>
  <div class="loading-sub">スプレッドシートからデータを取得しています</div>
</div>
<button class="sidebar-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>
<div class="sidebar">
  <div class="sidebar-header">
    <h1><span class="icon-pill">💊</span>施設在宅マップ</h1>
    <div class="stats-bar">
      <div class="stat"><span class="stat-value" id="pharmacyCount">0</span><span class="stat-label">薬局</span></div>
      <div class="stat"><span class="stat-value" id="facilityCount">0</span><span class="stat-label">施設</span></div>
      <div class="stat"><span class="stat-value" id="areaCount">0</span><span class="stat-label">エリア</span></div>
      <div class="stat"><span class="stat-value" id="inactiveCountStat">0</span><span class="stat-label">未実施</span></div>
    </div>
    <div class="meta-bar">
      <span id="metaUpdated">📅 --</span>
      <span id="metaErrors"></span>
    </div>
  </div>
  <div class="controls-wrapper">
    <div class="search-container">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-box" placeholder="薬局名・施設名・住所・施設形態で検索..." id="searchInput" oninput="onFilterChange()">
    </div>
    <div class="filter-row" id="areaFilters"></div>
    <div class="filter-row">
      <span class="filter-label">形態:</span>
      <select class="facility-type-select" id="facilityTypeFilter" onchange="onFilterChange()">
        <option value="">すべて</option>
      </select>
      <button class="toggle-inactive" id="toggleInactive" onclick="toggleInactiveStores()"><span class="diamond"></span>未実施</button>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('list')">📋 薬局一覧</button>
    <button class="tab-btn" onclick="switchTab('route')">🔍 ルート検索</button>
  </div>
  <div class="tab-content active" id="tab-list">
    <div class="pharmacy-list" id="pharmacyList"></div>
  </div>
  <div class="tab-content" id="tab-route">
    <div class="route-panel">
      <div><label>① 薬局を選択</label><div id="pharmacySelector"></div></div>
      <div><label>② 施設を選択</label><div id="facilitySelector"></div></div>
      <button class="route-search-btn" id="routeSearchBtn" onclick="searchCustomRoute()" disabled>ルートを検索</button>
      <div class="route-result" id="routeResult">
        <div class="route-result-title">検索結果</div>
        <div class="route-result-names" id="routeResultNames"></div>
        <div class="route-result-detail" id="routeResultDetail"></div>
        <button class="route-clear-btn" onclick="clearCustomRoute()">ルートをクリア</button>
      </div>
    </div>
  </div>
</div>
<div class="map-container">
  <div id="map"></div>
  <div class="map-legend">
    <div class="legend-title">凡例</div>
    <div class="legend-item"><div class="legend-icon"><svg width="18" height="18" viewBox="0 0 20 20"><rect x="2" y="2" width="16" height="16" rx="3" fill="#3b5cff" stroke="#fff" stroke-width="1.5"/><line x1="10" y1="5" x2="10" y2="15" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/><line x1="5" y1="10" x2="15" y2="10" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg></div>薬局</div>
    <div class="legend-item"><div class="legend-icon"><svg width="18" height="18" viewBox="0 0 20 20"><circle cx="10" cy="10" r="8" fill="#3b5cff" stroke="#fff" stroke-width="1.5"/><rect x="6" y="9" width="8" height="6" rx="0.5" fill="#fff"/><polygon points="10,5 5,10 15,10" fill="#fff"/></svg></div>施設</div>
    <div class="legend-item"><div class="legend-icon"><svg width="18" height="18" viewBox="0 0 20 20"><rect x="5" y="5" width="10" height="10" rx="1" fill="#9ca3af" stroke="#fff" stroke-width="1.5" transform="rotate(45 10 10)"/></svg></div>未実施店舗</div>
    <div class="legend-item"><div class="legend-icon"><svg width="20" height="6"><line x1="0" y1="3" x2="20" y2="3" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4,3"/></svg></div>直線距離</div>
    <div class="legend-item"><div class="legend-icon"><svg width="20" height="6"><line x1="0" y1="3" x2="20" y2="3" stroke="#3b5cff" stroke-width="3" stroke-dasharray="6,4"/></svg></div>実ルート</div>
    <div class="legend-item"><div class="legend-icon"><svg width="20" height="6"><line x1="0" y1="3" x2="20" y2="3" stroke="#f43f5e" stroke-width="3"/></svg></div>カスタムルート</div>
  </div>
</div>
<script>
// ========== v5.1 HTMLエスケープユーティリティ ==========
// CSV由来のスプレッドシート文字列を innerHTML/bindPopup に連結する際、
// HTML特殊文字をエスケープしてXSSを防止する。
// 施設名・住所・店舗名などに < > & " ' が含まれても崩れない。
function esc(s){
  if(s===null||s===undefined)return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

// ========== データURL ==========
var SHEET_CSV_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vQItIRx7q0uY8gXB91QxXGJ6pzv39ElKNlCGiIPCaCheWkymFbBjmUeM2HEmeKH0V0UQULS0_tsFdeI/pub?gid=1251366496&single=true&output=csv';
var INACTIVE_CSV_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vQItIRx7q0uY8gXB91QxXGJ6pzv39ElKNlCGiIPCaCheWkymFbBjmUeM2HEmeKH0V0UQULS0_tsFdeI/pub?gid=839239590&single=true&output=csv';

// ========== 色パレット ==========
var DISTINCT_COLORS=['#e63946','#2563eb','#16a34a','#f59e0b','#9333ea','#06b6d4','#dc2626','#0d9488','#ea580c','#4f46e5','#15803d','#db2777','#0284c7','#b45309','#7c3aed','#059669','#c026d3','#1d4ed8','#ca8a04','#be123c'];
var AREA_ORDER={'治外法権':0,'第一エリア':1,'第二エリア':2,'第三エリア':3,'第四エリア':4,'第五エリア':5};

// ========== 状態管理 ==========
var DATA=[],pharmacyGroups=[],inactiveMarkers=[],inactiveData=[];
var routeLines=[],straightLines=[],customRouteLine=null,routeCache={};
var activeArea='全て',activeGroupIndex=null,inactiveVisible=false,activeFacilityType='';
var acPharmacy=null,acFacility=null;
var dataErrors=0;

// ========== マップ初期化 ==========
var map=L.map('map',{center:[36.2,138.0],zoom:6,zoomControl:false});
L.control.zoom({position:'topright'}).addTo(map);
L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png',{attribution:'&copy; <a href="https://maps.gsi.go.jp/development/ichiran.html">国土地理院</a>',maxZoom:18}).addTo(map);

// [F] 地図クリックで選択解除
map.on('click',function(){
  if(activeGroupIndex!==null){
    document.querySelectorAll('.facility-list').forEach(function(el){el.classList.remove('open');});
    document.querySelectorAll('.pharmacy-card').forEach(function(el){el.classList.remove('active');});
    clearRoutes();clearStraightLines();
    activeGroupIndex=null;
  }
});

// ========== CSV解析（PapaParse使用） ==========
function parseCSV(text){
  var result=Papa.parse(text,{header:true,skipEmptyLines:true,transformHeader:function(h){return h.trim();},transform:function(v){return v.trim();}});
  return result.data;
}

function csvToData(rows){
  var pm={},errs=0;
  rows.forEach(function(r){
    var sn=r['店舗名称'],fn=r['担当施設名称'],sLat=parseFloat(r['店舗緯度']),sLng=parseFloat(r['店舗経度']),fLat=parseFloat(r['施設緯度']),fLng=parseFloat(r['施設経度']);
    if(!sn||!fn||isNaN(sLat)||isNaN(sLng)||isNaN(fLat)||isNaN(fLng)){errs++;return;}
    var key=r['店舗番号']+'_'+sn;
    if(!pm[key])pm[key]={name:sn,storeNum:r['店舗番号'],address:r['店舗所在地']||'',area:r['エリア']||'',lat:sLat,lng:sLng,role:r['役割']||'コア',facilities:[]};
    pm[key].facilities.push({name:fn,type:r['施設形態']||'',address:r['施設所在地']||'',lat:fLat,lng:fLng,patients:r['担当患者数']||'',frequency:r['配達頻度']||'',visitFlag:r['往診同行有無']||'',visitIrai:r['往診同行_依頼先']||'',visitDay:r['往診同行_往診曜日']||'',visitTime:r['往診同行_時間帯']||'',visitNinzu:r['往診同行_人数']||'',visitNote:r['往診同行_特記事項']||'',unbilledStatus:r['未算定施設']||'',nonbillableStatus:r['算定不可施設']||'',keisanStatus:r['算定の有無']||'',keisanReason:r['非算定の理由']||''});
  });
  dataErrors=errs;
  var result=Object.values(pm);
  result.sort(function(a,b){var ao=AREA_ORDER[a.area]!==undefined?AREA_ORDER[a.area]:99;var bo=AREA_ORDER[b.area]!==undefined?AREA_ORDER[b.area]:99;return ao-bo||a.name.localeCompare(b.name);});
  return result;
}

function assignColors(data){
  var ag={};data.forEach(function(p,i){if(!ag[p.area])ag[p.area]=[];ag[p.area].push(i);});
  var cm={},golden=(1+Math.sqrt(5))/2,nc=DISTINCT_COLORS.length;
  Object.keys(ag).forEach(function(area){var indices=ag[area],ao=(AREA_ORDER[area]||0)*7;indices.forEach(function(idx,j){cm[idx]=DISTINCT_COLORS[(Math.floor((j*golden*nc)%nc)+ao)%nc];});});
  return cm;
}

// ========== ルート ==========
function clearRoutes(){routeLines.forEach(function(l){map.removeLayer(l);});routeLines=[];}
function clearStraightLines(){straightLines.forEach(function(l){map.removeLayer(l);});straightLines=[];}
function clearCustomRoute(){if(customRouteLine){map.removeLayer(customRouteLine);customRouteLine=null;}document.getElementById('routeResult').classList.remove('show');}

function fetchRoute(fLat,fLng,tLat,tLng,cb){
  var key=fLat+','+fLng+'>'+tLat+','+tLng;
  if(routeCache[key]){cb(routeCache[key]);return;}
  fetch('https://router.project-osrm.org/route/v1/driving/'+fLng+','+fLat+';'+tLng+','+tLat+'?overview=full&geometries=geojson')
  .then(function(r){return r.json();}).then(function(d){
    if(d.code==='Ok'&&d.routes&&d.routes.length>0){var rt=d.routes[0];var res={distance:rt.distance,duration:rt.duration,geometry:rt.geometry};routeCache[key]=res;cb(res);}else cb(null);
  }).catch(function(){cb(null);});
}
function formatDistance(m){return m<1000?Math.round(m)+'m':(m/1000).toFixed(1)+'km';}
function formatDuration(s){var mins=Math.round(s/60);if(mins<60)return mins+'分';var h=Math.floor(mins/60),m=mins%60;return h+'時間'+(m>0?m+'分':'');}

// [I] 直線距離を計算
function straightDist(lat1,lng1,lat2,lng2){
  var R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// [I] 薬局選択時：直線のみ表示
function drawStraightLinesForGroup(gi){
  var g=pharmacyGroups[gi],p=g.data;
  p.facilities.forEach(function(f,fi){
    var line=L.polyline([[p.lat,p.lng],[f.lat,f.lng]],{color:'#94a3b8',weight:2,opacity:0.5,dashArray:'6,4'}).addTo(map);
    straightLines.push(line);
    var dist=straightDist(p.lat,p.lng,f.lat,f.lng);
    var el=document.getElementById('route-info-'+gi+'-'+fi);
    if(el)el.innerHTML='<div class="facility-route-info"><span class="route-badge">📏 直線 '+formatDistance(dist)+'</span></div><div class="route-click-hint" onclick="event.stopPropagation();fetchRealRoute('+gi+','+fi+')">▶ 実ルートを取得</div>';
  });
}

// [I] 施設クリック or リンククリック時：実ルート取得
function fetchRealRoute(gi,fi){
  var g=pharmacyGroups[gi],p=g.data,f=p.facilities[fi],color=g.color;
  var el=document.getElementById('route-info-'+gi+'-'+fi);
  if(el)el.innerHTML='<div class="facility-route-info"><span style="color:#999;font-size:9px">🔄 実ルート取得中...</span></div>';
  fetchRoute(p.lat,p.lng,f.lat,f.lng,function(res){
    if(res){
      if(el)el.innerHTML='<div class="facility-route-info"><span class="route-badge">🚗 '+formatDistance(res.distance)+'</span><span class="route-badge">⏱ '+formatDuration(res.duration)+'</span></div>';
      var coords=res.geometry.coordinates.map(function(c){return[c[1],c[0]];});
      var rl=L.polyline(coords,{color:color,weight:4,opacity:0.7,dashArray:'8,6',lineCap:'round'}).addTo(map);
      routeLines.push(rl);
    } else {
      if(el)el.innerHTML='<div class="facility-route-info"><span style="color:#e63946;font-size:9px">⚠ 実ルート取得不可</span></div>';
    }
  });
}

function matchesFacilityType(facilityType,filterValue){

}

function createAutocomplete(containerId,items,placeholder){
  var container=document.getElementById(containerId),selectedValue=null,highlightIdx=-1;
  var input=document.createElement('input');input.type='text';input.className='autocomplete-input';input.placeholder=placeholder;
  var tag=document.createElement('div');tag.className='selected-tag';tag.style.display='none';
  var listEl=document.createElement('div');listEl.className='autocomplete-list';
  var wrapper=document.createElement('div');wrapper.className='autocomplete-wrapper';
  wrapper.appendChild(input);wrapper.appendChild(tag);wrapper.appendChild(listEl);container.appendChild(wrapper);
  function renderList(q){listEl.innerHTML='';highlightIdx=-1;q=(q||'').toLowerCase();var matched=items.filter(function(it){return it.label.toLowerCase().indexOf(q)>=0||(it.sub&&it.sub.toLowerCase().indexOf(q)>=0);});
    if(!matched.length){listEl.innerHTML='<div style="padding:10px;font-size:11px;color:#999;text-align:center">該当なし</div>';listEl.classList.add('show');return;}
    matched.slice(0,50).forEach(function(it){var div=document.createElement('div');div.className='autocomplete-item';div.innerHTML='<span class="autocomplete-item-name">'+esc(it.label)+'</span>'+(it.sub?'<span class="autocomplete-item-sub">'+esc(it.sub)+'</span>':'');div.addEventListener('mousedown',function(e){e.preventDefault();selectItem(it);});listEl.appendChild(div);});listEl.classList.add('show');}
  function selectItem(it){selectedValue=it.value;input.style.display='none';tag.style.display='flex';tag.innerHTML='<span>'+esc(it.label)+'</span><button class="clear-btn" title="クリア">✕</button>';tag.querySelector('.clear-btn').addEventListener('click',function(){clearSel();});listEl.classList.remove('show');checkReady();}
  function clearSel(){selectedValue=null;input.style.display='';input.value='';tag.style.display='none';listEl.classList.remove('show');input.focus();checkReady();}
  input.addEventListener('focus',function(){renderList(input.value);});input.addEventListener('input',function(){renderList(input.value);});
  input.addEventListener('blur',function(){setTimeout(function(){listEl.classList.remove('show');},200);});
  input.addEventListener('keydown',function(e){var its=listEl.querySelectorAll('.autocomplete-item');if(e.key==='ArrowDown'){e.preventDefault();highlightIdx=Math.min(highlightIdx+1,its.length-1);upHL(its);}else if(e.key==='ArrowUp'){e.preventDefault();highlightIdx=Math.max(highlightIdx-1,0);upHL(its);}else if(e.key==='Enter'&&highlightIdx>=0&&its[highlightIdx]){e.preventDefault();its[highlightIdx].dispatchEvent(new Event('mousedown'));}});
  function upHL(its){its.forEach(function(el,i){el.classList.toggle('highlighted',i===highlightIdx);});if(its[highlightIdx])its[highlightIdx].scrollIntoView({block:'nearest'});}
  return{getValue:function(){return selectedValue;},clear:clearSel,_addItem:function(it){items.push(it);}};
}

    list.innerHTML='<div class="no-results"><div class="no-results-icon">🔍</div>該当する薬局・施設が見つかりません<div class="no-results-text">検索条件やフィルタを変更してみてください</div></div>';
  }

  document.getElementById('pharmacyCount').textContent=totalP;
  document.getElementById('facilityCount').textContent=totalF;
  document.getElementById('areaCount').textContent=Object.keys(areas).length;
}

function toggleFacilities(index){
  var wasActive=activeGroupIndex===index;
  document.querySelectorAll('.facility-list').forEach(function(el){el.classList.remove('open');});
  document.querySelectorAll('.pharmacy-card').forEach(function(el){el.classList.remove('active');});
  clearRoutes();clearStraightLines();clearCustomRoute();
  if(!wasActive){
    var fl=document.getElementById('flist-'+index),cd=document.getElementById('pcard-'+index);
    if(fl)fl.classList.add('open');if(cd)cd.classList.add('active');
    activeGroupIndex=index;
    map.fitBounds(L.latLngBounds(pharmacyGroups[index].markers.map(function(m){return m.getLatLng();})),{padding:[80,80],maxZoom:14});
    // [I] 直線のみ表示
    drawStraightLinesForGroup(index);
  }else activeGroupIndex=null;
}
function focusFacility(gi,fi){
  var mk=pharmacyGroups[gi].markers[fi+1];
  map.setView(mk.getLatLng(),15,{animate:true});mk.openPopup();
  // [I] 施設クリックで実ルート取得
  fetchRealRoute(gi,fi);
}

// ========== メイン読み込み ==========
fetch(SHEET_CSV_URL).then(function(res){return res.text();}).then(function(csvText){
  var rows=parseCSV(csvText);
  DATA=csvToData(rows);
  var colorMap=assignColors(DATA);

  DATA.forEach(function(p,i){
    var color=colorMap[i]||'#6b7280',markers=[];
    markers.push(L.marker([p.lat,p.lng],{icon:createPharmacyIcon(color,p.role)}).bindPopup('<div class="popup-type">💊 薬局</div><div class="popup-title">'+(p.storeNum?esc(p.storeNum)+' ':'')+esc(p.name)+'</div><div class="popup-address">'+esc(p.address)+'</div><div class="popup-detail">'+esc(p.area)+' ／ '+p.facilities.length+'施設担当</div>').addTo(map));
    p.facilities.forEach(function(f){
      // 患者数・配達頻度の表示整形
      // - 患者数は「33人」「約20人」のように既に「人」が含まれているケースが多いため、末尾に「人」がなければ補う
      // - 配達頻度が空欄の場合は配達頻度ラベルごと省略
      // v5.1: CSV由来文字列はすべて esc() でエスケープしXSS対策
      var popupHtml='<div class="popup-type">🏠 '+esc(f.type||'施設')+'</div><div class="popup-title">'+esc(f.name)+'</div><div class="popup-address">'+esc(f.address)+'</div><div class="popup-parent">担当店舗：'+(p.storeNum?esc(p.storeNum)+' ':'')+esc(p.name)+'</div>';
      if(f.patients){
        var pStr=String(f.patients).trim();
        // 末尾が「人」で終わっていなければ付ける（ただし数値や漢字数字のみの場合など）
        if(pStr&&!/人\s*$/.test(pStr))pStr=pStr+'人';
        var detail='患者数：'+esc(pStr);
        if(f.frequency)detail+='／配達頻度：'+esc(f.frequency);
        popupHtml+='<div class="popup-detail">'+detail+'</div>';
      }
      // v6.1: 算定の有無（常時表示）・非算定の理由（S=無 かつ T≠空欄 の時のみ表示）
      // 旧表示「未算定施設／算定不可施設」は撤去、新表示に置換
      // 仕様:
      //   - 算定の有無: 常時表示（有/無/不明）
      //   - 非算定の理由: S='無' かつ T が空でないときのみ表示
      //   - S='有' のときは、仮にTに値が残っていても理由は表示しない（データ不整合の二重防御）
      //   - S が空欄・想定外値のときは「不明」と表示し、理由は出さない
      var keisanRaw=String(f.keisanStatus||'').trim();
      var reasonRaw=String(f.keisanReason||'').trim();
      var keisanDisp;
      if(keisanRaw==='有')keisanDisp='<span class="status-yes">有</span>';
      else if(keisanRaw==='無')keisanDisp='<span class="status-no">無</span>';
      else keisanDisp='<span class="status-no">不明</span>';
      popupHtml+='<div class="popup-status"><span class="status-label">算定の有無：</span>'+keisanDisp+'</div>';
      // v6.1: 厳密化 — S='無' のときだけ理由を表示
      if(keisanRaw==='無' && reasonRaw!==''){
        popupHtml+='<div class="popup-status"><span class="status-label">非算定の理由：</span>'+esc(reasonRaw)+'</div>';
      }
      if(f.visitFlag==='あり'){popupHtml+='<div class="popup-visit"><div class="popup-visit-title">🩺 往診同行情報</div>';if(f.visitIrai)popupHtml+='<div class="popup-visit-row">依頼先：'+esc(f.visitIrai)+'</div>';if(f.visitDay)popupHtml+='<div class="popup-visit-row">曜日：'+esc(f.visitDay)+'</div>';if(f.visitTime)popupHtml+='<div class="popup-visit-row">時間：'+esc(f.visitTime)+'</div>';if(f.visitNinzu)popupHtml+='<div class="popup-visit-row">人数：'+esc(f.visitNinzu)+'</div>';if(f.visitNote)popupHtml+='<div class="popup-visit-note">📝 '+esc(f.visitNote)+'</div>';popupHtml+='</div>';}
      markers.push(L.marker([f.lat,f.lng],{icon:createFacilityIcon(color)}).bindPopup(popupHtml,{maxWidth:280}).addTo(map));
    });
    pharmacyGroups.push({data:p,color:color,markers:markers});
  });

  // オートコンプリート
  var pItems=DATA.map(function(p,i){return{value:i,label:(p.storeNum?p.storeNum+' ':'')+p.name,sub:p.area+' ／ '+p.address};});
  var fItems=[];DATA.forEach(function(p,pi){p.facilities.forEach(function(f,fi){fItems.push({value:pi+'-'+fi,label:f.name,sub:'現担当：'+(p.storeNum?p.storeNum+' ':'')+p.name+' ／ '+(f.type||'')});});});
  acPharmacy=createAutocomplete('pharmacySelector',pItems,'薬局名を入力...');
  acFacility=createAutocomplete('facilitySelector',fItems,'施設名を入力...');

  buildAreaFilters();
  buildFacilityTypeFilter();
  renderSidebar();

  // [A] 最終更新日時
  document.getElementById('metaUpdated').textContent='📅 '+new Date().toLocaleDateString('ja-JP');

  // [B] データ品質表示
  if(dataErrors>0)document.getElementById('metaErrors').innerHTML='<span class="warn">⚠ 欠損 '+dataErrors+'件</span>';

  // 未実施店舗読み込み
  loadInactiveStores(function(){
    document.getElementById('loadingOverlay').style.display='none';
  });
}).catch(function(err){
  document.getElementById('loadingOverlay').innerHTML='<div style="text-align:center;padding:40px"><div style="font-size:20px;margin-bottom:12px">⚠️ データの読み込みに失敗しました</div><div style="font-size:14px;color:#666;margin-bottom:8px">スプレッドシートの公開設定を確認してください</div><div style="font-size:12px;color:#999">'+err.message+'</div><button onclick="location.reload()" style="margin-top:20px;padding:10px 24px;background:#3b5cff;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer">再読み込み</button></div>';
});
</script>
</body>
</html>
